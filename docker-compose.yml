services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-studyplanner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-studyplanner}
      POSTGRES_DB: ${POSTGRES_DB:-studyplanner}
    ports:
      # Host 5433 -> container 5432. Host 5432 is taken by a native PostgreSQL
      # install on this machine, so we expose 5433 to avoid connecting to the
      # wrong server. Bound to loopback only so the DB isn't reachable off-host.
      # Inside the compose network the backend still uses db:5432.
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-studyplanner} -d ${POSTGRES_DB:-studyplanner}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      # Override host so the backend reaches the db service on the compose network
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-studyplanner}:${POSTGRES_PASSWORD:-studyplanner}@db:5432/${POSTGRES_DB:-studyplanner}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    # On boot: run migrations, seed (idempotent), then start the API with 2 workers
    command: >
      sh -c "python -m app.cli migrate &&
             python -m app.cli seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
